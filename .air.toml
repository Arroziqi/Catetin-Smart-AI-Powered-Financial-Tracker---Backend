root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main"
  cmd = "swag init -g cmd/docs/docs.go && go build -o ./tmp/main ./cmd/main.go"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "docs"]
  exclude_file = []
  exclude_pattern = ["*.go"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app_output = ""
  build_log_color = ""
  main_attr_color = ""
  main_bg_color = ""
  time_attr_color = ""
  time_bg_color = ""

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
